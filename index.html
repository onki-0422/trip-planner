<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NL荷兰11 天探索行程 </title>
<meta name="description" content="基于 Uilenstede 102 的 Amsterdam、Den Haag、Rotterdam、Utrecht 与 Zaanse Schans 单页行程。">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --bg-primary:#f7f4ee;
  --bg-secondary:#f1ede6;
  --bg-tertiary:#fbfaf7;
  --bg-elevated:rgba(255,255,255,.78);
  --bg-glass:rgba(255,255,255,.62);
  --text-primary:#1f1b17;
  --text-secondary:#6f665d;
  --text-tertiary:#9b9187;
  --accent:#254c7d;
  --accent-soft:#e8eef7;
  --gold:#9c7b45;
  --wine:#6d3f35;
  --green:#3e6b53;
  --blue:#3566a8;
  --purple:#69558f;
  --orange:#af6c2c;
  --shadow-sm:0 8px 24px rgba(52,40,28,.06);
  --shadow-md:0 16px 36px rgba(52,40,28,.1);
  --shadow-lg:0 24px 60px rgba(52,40,28,.14);
  --radius-sm:10px;
  --radius-md:16px;
  --radius-lg:22px;
  --radius-xl:28px;
  --separator:rgba(60,44,24,.12);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue","Arial",sans-serif;
  background:radial-gradient(circle at top, #fdfbf7 0%, var(--bg-primary) 42%, var(--bg-secondary) 100%);
  color:var(--text-primary);
  -webkit-font-smoothing:antialiased;
  line-height:1.55;
}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
button{font:inherit}
#map{width:100%;height:40vh;min-height:300px;position:relative;z-index:1;border-bottom:1px solid rgba(90,70,45,.08)}
.locate-btn,.map-reset-btn{width:38px;height:38px;border-radius:10px;background:rgba(255,255,255,.9);backdrop-filter:blur(10px);border:none;box-shadow:0 1px 6px rgba(0,0,0,.18);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer}
.locate-btn.active{color:var(--blue)}
.tabs{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch;background:rgba(251,250,247,.8);backdrop-filter:saturate(160%) blur(18px);position:relative;top:auto;z-index:99;border-bottom:1px solid var(--separator);scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:8px 16px;border-radius:999px;border:1px solid transparent;background:rgba(255,255,255,.7);color:var(--text-secondary);font-size:14px;font-weight:600;cursor:pointer;transition:all .25s ease;white-space:nowrap}
.tab:hover{transform:translateY(-1px);box-shadow:var(--shadow-sm)}
.tab.active{background:var(--accent);color:#fff;box-shadow:var(--shadow-sm)}
.content{max-width:900px;margin:0 auto;padding:18px 16px calc(36px + var(--safe-bottom))}
.hero{text-align:center;padding:30px 20px 24px}
.hero h1,.day-head h2,.detail-title,.modal-title,.section-title-serif{font-family:Georgia,"Times New Roman",serif;letter-spacing:-.02em}
.hero h1{font-size:34px;line-height:1.08;font-weight:700}
.hero .subtitle{font-size:17px;color:var(--text-secondary);margin-top:8px}
.hero .microcopy{margin-top:14px;font-size:13px;color:var(--text-tertiary)}
.info-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-bottom:22px}
.info-card,.route-bar,.card,.pay-summary,.detail-block,.mini-guide,.transit-summary{background:var(--bg-elevated);backdrop-filter:blur(18px);border:1px solid rgba(120,96,64,.08);box-shadow:var(--shadow-sm)}
.info-card{border-radius:var(--radius-lg);padding:16px}
.info-card .label{font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-bottom:6px}
.info-card .value{font-size:15px;font-weight:600;line-height:1.45}
.section-head{font-size:12px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.1em;padding:22px 0 10px}
.day-head{padding:18px 0 14px}
.day-head h2{font-size:30px;font-weight:700}
.day-head p{font-size:15px;color:var(--text-secondary);margin-top:4px}
.route-bar{border-radius:var(--radius-md);padding:14px 16px;margin-bottom:16px;font-size:14px;color:var(--text-secondary);line-height:1.75}
.route-bar strong{color:var(--text-primary)}
.day-list .card{margin-bottom:10px;cursor:pointer}
.day-list .card .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:7px}
.timeline{position:relative;padding-left:26px}.timeline::before{content:'';position:absolute;left:8px;top:20px;bottom:20px;width:1.5px;background:rgba(115,89,54,.14)}
.tl-item{position:relative;margin-bottom:12px}
.tl-dot{position:absolute;left:-18px;top:20px;width:10px;height:10px;border-radius:50%;z-index:1;box-shadow:0 0 0 4px var(--bg-secondary)}
.tl-dot.food{background:var(--wine)}.tl-dot.spot{background:var(--blue)}.tl-dot.hotel{background:var(--orange)}.tl-dot.drink{background:var(--purple)}.tl-dot.transport{background:var(--text-tertiary)}
.card{border-radius:var(--radius-md);padding:16px 18px;transition:transform .25s ease, box-shadow .25s ease;border:1px solid rgba(120,96,64,.08)}
.card.card-clickable{cursor:pointer}
.card.card-clickable:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.card .time{font-size:12px;font-weight:700;color:var(--text-tertiary);letter-spacing:.06em;text-transform:uppercase}
.card .name{font-size:18px;font-weight:700;margin:4px 0 6px;display:flex;align-items:center;gap:6px}
.card .desc{font-size:14px;color:var(--text-secondary);line-height:1.6}
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px}
.badge.food{background:rgba(109,63,53,.1);color:var(--wine)}
.badge.spot{background:rgba(53,102,168,.12);color:var(--blue)}
.badge.drink{background:rgba(105,85,143,.12);color:var(--purple)}
.badge.transport{background:rgba(60,60,67,.1);color:var(--text-secondary)}
.badge.museum{background:rgba(156,123,69,.14);color:var(--gold)}
.badge.church{background:rgba(62,107,83,.12);color:var(--green)}
.badge.neighborhood{background:rgba(37,76,125,.09);color:var(--accent)}
.meta-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.meta-pill{font-size:12px;padding:4px 10px;border-radius:999px;background:rgba(255,255,255,.8);color:var(--text-secondary);border:1px solid rgba(120,96,64,.08)}
.budget{display:inline-block;margin-top:8px;padding:4px 10px;background:var(--accent-soft);border-radius:999px;font-size:12px;color:var(--accent);font-weight:600}
.links{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:5px;padding:9px 14px;border-radius:999px;font-size:13px;font-weight:700;border:none;cursor:pointer;text-decoration:none !important;transition:transform .2s ease, filter .2s ease;white-space:nowrap}
.btn:hover{transform:translateY(-1px)}
.btn:active{filter:brightness(.95)}
.btn.nav{background:var(--accent);color:#fff}
.btn.rsv{background:var(--green);color:#fff}
.btn.official{background:#efe5d4;color:#6d5331}
.btn.detail{background:#f3f0eb;color:var(--text-primary)}
.btn.operator{background:#f5f7fb;color:var(--accent)}
.transit-summary{margin-top:12px;border-radius:14px;padding:12px 14px}
.transit-summary h4{font-size:12px;color:var(--gold);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.transit-preview{display:flex;flex-direction:column;gap:6px}
.transit-leg{display:flex;justify-content:space-between;gap:10px;font-size:13px;color:var(--text-secondary)}
.transit-leg strong{color:var(--text-primary)}
.detail-overlay{position:fixed;inset:0;background:rgba(29,24,18,.28);backdrop-filter:blur(6px);z-index:10000;opacity:0;pointer-events:none;transition:opacity .28s ease}
.detail-overlay.show{opacity:1;pointer-events:auto}
.detail-shell{position:absolute;inset:auto 0 0 0;height:min(84vh,900px);background:linear-gradient(180deg,rgba(252,250,246,.98),rgba(247,244,238,.98));border-radius:28px 28px 0 0;box-shadow:var(--shadow-lg);transform:translateY(100%);transition:transform .34s cubic-bezier(.22,1,.36,1);overflow:hidden;border-top:1px solid rgba(120,96,64,.12)}
.detail-overlay.show .detail-shell{transform:translateY(0)}
@media (min-width: 980px){
  .detail-shell{inset:0 0 0 auto;width:min(560px,48vw);height:100vh;border-radius:28px 0 0 28px;transform:translateX(100%)}
  .detail-overlay.show .detail-shell{transform:translateX(0)}
}
.detail-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;padding:20px 20px 16px;border-bottom:1px solid var(--separator);background:rgba(251,250,247,.9);backdrop-filter:blur(14px)}
.detail-kicker{font-size:11px;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;font-weight:700;margin-bottom:6px}
.detail-title{font-size:31px;line-height:1.08}
.detail-subtitle{margin-top:6px;font-size:14px;color:var(--text-secondary)}
.detail-close{width:38px;height:38px;border-radius:50%;border:none;background:#fff;box-shadow:var(--shadow-sm);cursor:pointer;font-size:18px}
.detail-scroll{height:calc(100% - 90px);overflow:auto;padding:18px 20px 36px}
.detail-block{border-radius:20px;padding:16px 16px;margin-bottom:14px}
.detail-block h3{font-size:13px;color:var(--gold);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
.detail-block p,.detail-block li{font-size:14px;color:var(--text-secondary);line-height:1.72}
.detail-block ul{padding-left:18px}
.highlight-grid{display:grid;gap:10px}
.highlight-card{padding:14px;border-radius:16px;background:rgba(255,255,255,.76);border:1px solid rgba(120,96,64,.08)}
.highlight-card h4{font-family:Georgia,"Times New Roman",serif;font-size:18px;margin-bottom:6px}
.highlight-meta{font-size:12px;color:var(--gold);margin-bottom:8px}
.restaurant-list{display:grid;gap:10px}
.restaurant-item{padding:14px;border-radius:16px;background:rgba(255,255,255,.76);border:1px solid rgba(120,96,64,.08)}
.restaurant-item h4{font-size:16px;margin-bottom:5px}
.dish-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.dish-pill{font-size:12px;padding:4px 10px;border-radius:999px;background:#f5f1ea;color:var(--text-secondary);border:1px solid rgba(120,96,64,.08)}
.quick-actions{display:flex;flex-wrap:wrap;gap:8px}
.pay-summary{border-radius:18px;padding:15px 16px;font-size:13px;line-height:1.75;margin-bottom:10px}
.pay-summary h4{font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.legend{display:flex;gap:14px;flex-wrap:wrap;padding:8px 0;font-size:12px;color:var(--text-secondary)}
.legend-item{display:flex;align-items:center;gap:5px}.legend-dot{width:8px;height:8px;border-radius:50%}
.leaflet-popup-content-wrapper{border-radius:16px !important;box-shadow:var(--shadow-lg) !important;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",sans-serif !important}
.leaflet-popup-content{font-size:14px !important;line-height:1.5 !important;margin:12px 14px !important}.leaflet-popup-content a{color:var(--accent) !important}
.leaflet-popup-tip{background:#fff !important}
.leaflet-control-zoom a{width:34px !important;height:34px !important;line-height:34px !important;font-size:16px !important;border-radius:10px !important;background:rgba(255,255,255,.85) !important;backdrop-filter:blur(10px) !important;border:.5px solid var(--separator) !important;color:var(--text-primary) !important}
.leaflet-control-zoom{border-radius:12px !important;overflow:hidden;box-shadow:var(--shadow-md) !important;border:none !important}
.leaflet-control-attribution{font-size:9px !important;opacity:.5}
@media (max-width: 760px){
  .hero h1{font-size:28px}
  .info-grid{grid-template-columns:1fr}
  .content{padding:14px 14px calc(28px + var(--safe-bottom))}
  .day-head h2{font-size:26px}
  .detail-title{font-size:26px}
}
</style>
</head>
<body>
<div id="map"></div>
<div class="tabs" id="tabs"></div>
<div class="content" id="content"></div>
<div class="detail-overlay" id="detailOverlay" aria-hidden="true">
  <div class="detail-shell">
    <div class="detail-top">
      <div>
        <div class="detail-kicker" id="detailKicker">Detail</div>
        <div class="detail-title" id="detailTitle">Title</div>
        <div class="detail-subtitle" id="detailSubtitle">Subtitle</div>
      </div>
      <button class="detail-close" onclick="closeDetail()" aria-label="关闭详情">×</button>
    </div>
    <div class="detail-scroll" id="detailBody"></div>
  </div>
</div>
<script>
const OFFICIALS = {
  ns: 'https://www.ns.nl/en',
  gvb: 'https://www.gvb.nl/en',
  htm: 'https://www.htm.nl/en',
  ret: 'https://www.ret.nl/en/home/',
  uov: 'https://www.u-ov.info/'
};

const OPTIONS = {
  regionMode: 'intl',
  reviewMode: 'essential',
  paymentMode: 'simple'
};

const HOTEL = {
  name: 'Uilenstede 102, Amstelveen',
  lat: 52.3348,
  lng: 4.8629,
  officialUrl: 'https://www.uilenstede.nl/'
};

const DAYS = [
  { id: 0, label: '总览', color: '#254c7d', locations: [] },
  {
    id: 1,
    label: 'D1',
    date: '2026-08-20 Thu',
    title: 'Museumplein 经典开场',
    color: '#254c7d',
    routeSummary: '以 Museumplein 为唯一主区域。上午连看 Van Gogh Museum 与 Rijksmuseum，傍晚切去 De Pijp，减少折返。',
    dayLoop: {
      departure: '08:35 从 Uilenstede 102 出发：步行 6 分钟到 Uilenstede 站 → Metro 51 到 Amsterdam Zuid 约 7 分钟 → Metro 52 到 Vijzelgracht 约 8 分钟 → 步行 10 分钟到 Van Gogh Museum，全程约 31–35 分钟。',
      ending: '20:45 左右从 De Pijp / Albert Cuyp 一带返回：步行或短接驳 tram 到 De Pijp / Vijzelgracht → Metro 52 回 Amsterdam Zuid 约 8–10 分钟 → Metro 51 回 Uilenstede 约 7 分钟 → 步行 6 分钟回 Uilenstede 102，预计 21:20 前后到宿舍。'
    },
    locations: [
      {
        name: 'Van Gogh Museum',
        lat: 52.3584,
        lng: 4.8811,
        type: 'spot',
        category: 'museum',
        time: '09:30',
        desc: '阿姆斯特丹最应该优先锁票的馆之一，适合拿它作为整段旅行的艺术开场。',
        quickTag: '重预约馆',
        officialUrl: 'https://www.vangoghmuseum.nl/en',
        bookingUrl: 'https://www.vangoghmuseum.nl/en/visit/tickets',
        gmap: 'Van Gogh Museum Amsterdam',
        transit: [
          { mode:'Walk', line:'步行', from:'Uilenstede 102', to:'Uilenstede tram/metro stop', duration:'6 min', operator:'Local', ticketUrl:OFFICIALS.gvb },
          { mode:'Metro', line:'M51', from:'Uilenstede', to:'Amsterdam Zuid', duration:'7 min', operator:'GVB', ticketUrl:OFFICIALS.gvb },
          { mode:'Metro', line:'M52', from:'Amsterdam Zuid', to:'Vijzelgracht', duration:'8 min', operator:'GVB', ticketUrl:OFFICIALS.gvb },
          { mode:'Walk', line:'步行', from:'Vijzelgracht', to:'Van Gogh Museum', duration:'10 min', operator:'Local', ticketUrl:OFFICIALS.gvb }
        ],
        detailView: {
          intro: 'Van Gogh Museum 不只是“看向日葵”的地方，它把 Vincent van Gogh 的创作轨迹、精神状态、家庭书信与 19 世纪末欧洲现代主义的转折点串成了一条非常清晰的叙事线。',
          highlights: [
            {
              title:'Sunflowers',
              meta:'Vincent van Gogh · 1889',
              why:'这组向日葵是 Van Gogh 对色彩能量最直接的宣言。高饱和黄调既是装饰实验，也是情绪密度的视觉化。',
              story:'它原本也带有“欢迎 Gauguin 来阿尔勒同住”的意味，背后其实是 Van Gogh 对艺术共同体的理想。'
            },
            {
              title:'The Bedroom',
              meta:'Vincent van Gogh · 1888',
              why:'画面看似平静，实则用扭曲的透视和互补色制造一种不稳定但亲密的情绪空间。',
              story:'这是他在阿尔勒“黄房子”生活的象征性图像，也让人看到他把私人空间变成艺术乌托邦的愿望。'
            },
            {
              title:'Almond Blossom',
              meta:'Vincent van Gogh · 1890',
              why:'枝条与蓝天的构图明显受日本浮世绘影响，是 Van Gogh 晚期最轻盈、最有希望感的作品之一。',
              story:'这幅作品是送给新生侄子的礼物，所以整体气质也比其他晚期作品更像祝福。'
            },
            {
              title:'Self-Portraits',
              meta:'Vincent van Gogh · 1886–1889',
              why:'Van Gogh 的自画像不是单纯练习，而是一种用有限模特成本持续推进色彩与人格表达的实验室。',
              story:'他频繁画自己，一部分是经济现实，一部分也是把画布当成自我诊断的表面。'
            },
            {
              title:'Letters and Sketches',
              meta:'Correspondence with Theo',
              why:'馆中信件和速写会让你发现，Van Gogh 远比流行想象中更理性、更善于语言组织。',
              story:'很多后来成为名作的构想，最早都在给弟弟 Theo 的信里被解释和推演。'
            }
          ],
          pacing:'建议 90–120 分钟。先冲高峰作品层，再留时间给书信和生平线，理解会完整很多。'
        }
      },
      {
        name: 'Rijksmuseum',
        lat: 52.359998,
        lng: 4.885219,
        type: 'spot',
        category: 'museum',
        time: '13:00',
        desc: '荷兰黄金时代艺术与国家叙事的主场，规模比 Van Gogh Museum 更大，更适合挑重点看。',
        quickTag: '国家级博物馆',
        officialUrl: 'https://www.rijksmuseum.nl/en',
        bookingUrl: 'https://www.rijksmuseum.nl/en/tickets',
        gmap: 'Rijksmuseum Amsterdam',
        transit: [
          { mode:'Walk', line:'步行', from:'Van Gogh Museum', to:'Rijksmuseum', duration:'5 min', operator:'Local', ticketUrl:OFFICIALS.gvb }
        ],
        detailView: {
          intro: 'Rijksmuseum 的重点不是“尽量看完”，而是抓住 17 世纪荷兰如何把贸易、城市公民文化、宗教转型与绘画美学一起推到顶峰。',
          highlights: [
            {
              title:'The Night Watch',
              meta:'Rembrandt van Rijn · 1642',
              why:'这不是静止的集体肖像，而是一场被瞬间截取下来的城市民兵出动场面。光线与运动感重新定义了群像画。',
              story:'它后来被裁切过，今天看到的尺寸已经不是原貌，但仍然压得住整个馆。'
            },
            {
              title:'The Milkmaid',
              meta:'Johannes Vermeer · c.1658–1659',
              why:'Vermeer 用极端克制的室内场景证明，日常劳动也能拥有宗教般的宁静与重量。',
              story:'面包碎屑、墙面颗粒与光线处理让这幅小画成为“如何把平凡画得庄严”的典范。'
            },
            {
              title:'The Merry Family',
              meta:'Jan Steen · 1668',
              why:'看似热闹欢乐，实则带有道德讽喻，是理解荷兰市民文化与家庭幽默的很好入口。',
              story:'Jan Steen 常在混乱喜剧里埋警句，这幅就是“父母怎么做，孩子就怎么学”的视觉版。'
            },
            {
              title:'The Threatened Swan',
              meta:'Jan Asselijn · c.1650',
              why:'一只看似孤立的天鹅，后来被读成共和政治寓言，是荷兰国家记忆如何反向书写艺术的经典例子。',
              story:'画面上的政治指涉并非最初就有，而是后世加上的，这一点本身就很有意思。'
            },
            {
              title:'Gallery of Honour',
              meta:'Cuypers building axis',
              why:'就算不单看某一件作品，荣誉长廊本身的空间设计也在制造“国家艺术经典”的仪式感。',
              story:'Pierre Cuypers 的建筑把中世纪和文艺复兴语汇拼进现代博物馆框架，很适合边走边抬头。'
            }
          ],
          pacing:'建议至少 2 小时。直接先走 Gallery of Honour，再决定是否补 Delftware、模型船、装饰艺术。'
        }
      },
      {
        name: 'Museumplein',
        lat: 52.3580,

L.control.zoom({ position:'topright' }).addTo(map);

const LocateControl = L.Control.extend({

let locMarker, locCircle;
map.on('locationfound', e => {
  const r = e.accuracy / 2;
  if (locMarker) {
    locMarker.setLatLng(e.latlng);
    locCircle.setLatLng(e.latlng).setRadius(r);
  } else {
    locMarker = L.marker(e.latlng, {
      icon: L.divIcon({ className:'', html:'<div style="width:14px;height:14px;border-radius:50%;background:#007aff;border:2.5px solid #fff;box-shadow:0 0 6px rgba(0,122,255,.5)"></div><div class="loc-pulse" style="position:absolute;top:0;left:0"></div>', iconSize:[14,14], iconAnchor:[7,7] }),
      zIndexOffset:2000
    }).addTo(map);
    locCircle = L.circle(e.latlng, { radius:r, color:'#007aff', fillColor:'#007aff', fillOpacity:.08, weight:1 }).addTo(map);
  }
});
map.on('locationerror', () => {});

function icon(color, emoji) {
  return L.divIcon({
    className:'',
    html:`<div style="width:28px;height:28px;border-radius:50%;background:${color};border:2.5px solid #fff;display:flex;align-items:center;justify-content:center;font-size:13px;box-shadow:0 2px 8px rgba(0,0,0,.18)">${emoji || ''}</div>`,
    iconSize:[28,28], iconAnchor:[14,14], popupAnchor:[0,-16]
  });
}

L.marker([HOTEL.lat, HOTEL.lng], { icon:icon('#af6c2c', '🏨'), zIndexOffset:1000 }).addTo(map).bindPopup(`<b>${HOTEL.name}</b>`);

let markers = [], polylines = [];
const emojis = { food:'🍽️', spot:'📍', hotel:'🏨', transport:'🚃', drink:'☕' };

function clearMap() {
  markers.forEach(m => map.removeLayer(m));
  polylines.forEach(p => map.removeLayer(p));
  markers = [];
  polylines = [];
}

function mapPopupHTML(loc, dayLabel) {
  return `<b>${loc.name}</b><br><span style="color:#86868b">${dayLabel}</span><br>${loc.desc}<br><a href="#" onclick="event.preventDefault();openDetailByName('${dayLabel}', '${loc.name.replace(/'/g, "\\'")}')">查看详情</a>`;
}

function showDay(idx) {
  clearMap();
  if (idx === 0) {
    const pts = [];
    DAYS.forEach(d => d.locations.forEach(l => { if (l.lat) pts.push([l.lat, l.lng]); }));
    if (pts.length) map.fitBounds(pts, { padding:[30,30] });
    DAYS.slice(1).forEach(d => {
      d.locations.forEach(l => {
        if (!l.lat) return;
        const m = L.circleMarker([l.lat,l.lng], { radius:4, fillColor:d.color, color:'#fff', weight:1.5, fillOpacity:.9 })
          .addTo(map)
          .bindPopup(`<b>${l.name}</b><br><span style="color:#86868b">${d.label}</span>`);
        markers.push(m);
      });
    });
    return;
  }
  const day = DAYS.find(d => d.id === idx);
  if (!day) return;
  const coords = [];
  day.locations.forEach(l => {
    if (!l.lat) return;
    const m = L.marker([l.lat,l.lng], { icon: icon(day.color, emojis[l.type] || '📌') }).addTo(map);
    const q = l.gmap || encodeURIComponent(l.name + ' Netherlands');
    m.bindPopup(`<b>${l.name}</b>${l.time ? '<br><span style="color:#86868b">' + l.time + '</span>' : ''}<br>${l.desc}<br><a href="#" onclick="event.preventDefault();openAS('${l.name.replace(/'/g, "\\'")}',${l.lat},${l.lng},'${q}')">📍 导航</a> · <a href="#" onclick="event.preventDefault();openDetail(${day.id}, '${l.name.replace(/'/g, "\\'")}')">详情</a>`);
    markers.push(m);
    coords.push([l.lat,l.lng]);
  });
  if (coords.length > 1) {
    const pl = L.polyline(coords, { color:day.color, weight:2.5, opacity:.55, dashArray:'6,5' }).addTo(map);
    polylines.push(pl);
  }
  if (coords.length) map.fitBounds(coords, { padding:[40,40], maxZoom:14 });
}

function paymentVisibility() {
  if (OPTIONS.paymentMode === 'hidden') return false;
  return true;
}

function normalizedPay(loc) {
  if (loc.pay) return loc.pay;
  if (OPTIONS.paymentMode === 'detailed') return { card: 1, cash: 0.5 };
  if (OPTIONS.paymentMode === 'simple') return { card: 1 };
  return null;
}

function reviewLinks(loc) {
  if (OPTIONS.reviewMode === 'off') return [];
  const q = encodeURIComponent(loc.name + ' ' + (loc.gmap || ''));
  const links = [];
  if (OPTIONS.regionMode === 'cn') {
    if (OPTIONS.reviewMode === 'full' || OPTIONS.reviewMode === 'essential') {
      links.push({ label:'📕 小红书', cls:'official', href:`https://www.xiaohongshu.com/search_result?keyword=${q}&source=web_explore_feed` });
      if (loc.type === 'food' || loc.category === 'food-hub' || OPTIONS.reviewMode === 'full') {
        links.push({ label:'🍜 大众点评', cls:'operator', href:`https://m.dianping.com/searchshop?keyword=${q}` });
      }
    }
    return links;
  }
  if (OPTIONS.regionMode === 'intl' || OPTIONS.regionMode === 'hybrid') {
    links.push({ label:'⭐ Google Reviews', cls:'operator', href:`https://www.google.com/maps/search/?api=1&query=${q}` });
    if (OPTIONS.reviewMode === 'full' || loc.type === 'food' || loc.category === 'food-hub') {
      links.push({ label:'🧭 Tripadvisor', cls:'official', href:`https://www.tripadvisor.com/Search?q=${q}` });
    }
    if (OPTIONS.reviewMode === 'full' && (loc.category === 'food-hub' || loc.category === 'neighborhood' || loc.type === 'drink')) {
      links.push({ label:'💬 Reddit', cls:'detail', href:`https://www.reddit.com/search/?q=${q}` });
      links.push({ label:'📷 Instagram', cls:'detail', href:`https://www.instagram.com/explore/tags/${encodeURIComponent(loc.name.replace(/\s+/g, ''))}/` });
    }
  }
  return links;
}

function payChips(loc) {
  if (!paymentVisibility()) return '';
  const pay = normalizedPay(loc);
  if (!pay) return '';
  let h = '<div class="meta-row">';
  const labels = OPTIONS.paymentMode === 'simple'
    ? { card:'Card', cash:'Cash' }
    : { cash:'现金', card:'银行卡', transitCard:'交通卡', applepay:'Apple Pay', alipay:'支付宝' };
  for (const [k, label] of Object.entries(labels)) {
    if (pay[k] !== undefined) h += `<span class="meta-pill">${label}</span>`;
  }
  return h + '</div>';
}

function categoryBadge(loc) {
  const c = loc.category;
  if (c === 'museum') return '<span class="badge museum">博物馆</span>';
  if (c === 'church') return '<span class="badge church">教堂</span>';
  if (c === 'neighborhood') return '<span class="badge neighborhood">街区</span>';
  if (c === 'food-hub') return '<span class="badge food">餐区</span>';
  if (c === 'transit') return '<span class="badge transport">交通</span>';
  if (c === 'park') return '<span class="badge spot">公园</span>';
  return loc.type === 'food' ? '<span class="badge food">餐</span>' : '<span class="badge spot">景</span>';
}

function transitPreview(loc) {
  if (!loc.transit || !loc.transit.length) return '';
  return `<div class="transit-summary"><h4>到达方式</h4><div class="transit-preview">${loc.transit.slice(0,3).map(leg => `<div class="transit-leg"><span><strong>${leg.mode}</strong>${leg.line && leg.line !== '步行' ? ' · ' + leg.line : ''}<br>${leg.from} → ${leg.to}</span><span>${leg.duration}</span></div>`).join('')}</div></div>`;
}

function actionButtons(loc, dayId) {
  const q = loc.gmap || encodeURIComponent(loc.name + ' Netherlands');
  let html = `<button class="btn nav" onclick="openAS('${loc.name.replace(/'/g, "\\'")}',${loc.lat},${loc.lng},'${q}')">📍 导航</button>`;
  if (loc.officialUrl) html += `<a class="btn official" href="${loc.officialUrl}" target="_blank" rel="noreferrer">官网</a>`;
  if (loc.bookingUrl) html += `<a class="btn rsv" href="${loc.bookingUrl}" target="_blank" rel="noreferrer">Book Tickets</a>`;
  reviewLinks(loc).forEach(link => {
    html += `<a class="btn ${link.cls}" href="${link.href}" target="_blank" rel="noreferrer">${link.label}</a>`;
  });
  html += `<button class="btn detail" onclick="openDetail(${dayId}, '${loc.name.replace(/'/g, "\\'")}')">查看详情</button>`;
  return html;
}

function locCard(loc, dayId) {
  const dot = loc.type === 'food' ? 'food' : loc.type === 'spot' ? 'spot' : loc.type === 'drink' ? 'drink' : loc.type === 'hotel' ? 'hotel' : 'transport';
  const pills = [categoryBadge(loc)];
  if (loc.quickTag) pills.push(`<span class="meta-pill">${loc.quickTag}</span>`);
  if (loc.time) pills.push(`<span class="meta-pill">${loc.time}</span>`);
  return `<div class="tl-item">
    <div class="tl-dot ${dot}"></div>
    <div class="card card-clickable" onclick="if(!event.target.closest('.btn,.links,a'))openDetail(${dayId}, '${loc.name.replace(/'/g, "\\'")}')">
      <div class="time">${loc.time || '—'}</div>
      <div class="name">${loc.name}</div>
      <div class="desc">${loc.desc}</div>
      <div class="meta-row">${pills.join('')}</div>
      ${loc.budget ? `<div class="budget">${loc.budget}</div>` : ''}
      ${payChips(loc)}
      ${transitPreview(loc)}
      <div class="links">${actionButtons(loc, dayId)}</div>
    </div>
  </div>`;
}

function renderDay(idx) {
  const d = DAYS.find(x => x.id === idx);
  if (!d) return '';
  let html = `<div class="day-head"><h2>${d.title}</h2><p>${d.date}</p></div>`;
  html += `<div class="route-bar"><strong>区域逻辑</strong>：${d.routeSummary}</div>`;
  if (d.dayLoop) {
    html += `<div class="route-bar"><strong>Morning Departure</strong>：${d.dayLoop.departure}<br><br><strong>Day's End</strong>：${d.dayLoop.ending}</div>`;
  }
  if (d.overnightStay) {
    html += `<div class="route-bar"><strong>Overnight Stay</strong>：${d.overnightStay.hotelArea}<br><br><strong>Why this area</strong>：${d.overnightStay.reason}<br><br><strong>Hotel → First Attraction</strong>：${d.overnightStay.hotelToFirstAttraction}<br><br><strong>Last Attraction → Hotel</strong>：${d.overnightStay.lastAttractionToHotel}</div>`;
  }
  html += '<div class="section-head">当日节点</div><div class="timeline">';
  d.locations.forEach(l => html += locCard(l, idx));
  html += '</div>';
  return html;
}

let cur = 0;
const tabsEl = document.getElementById('tabs');
const contentEl = document.getElementById('content');
const detailOverlay = document.getElementById('detailOverlay');
const detailKicker = document.getElementById('detailKicker');
const detailTitle = document.getElementById('detailTitle');
const detailSubtitle = document.getElementById('detailSubtitle');
const detailBody = document.getElementById('detailBody');

DAYS.forEach(d => {
  const btn = document.createElement('button');
  btn.className = 'tab' + (d.id === 0 ? ' active' : '');
  btn.dataset.day = d.id;
  btn.textContent = d.label;
  tabsEl.appendChild(btn);
});

function go(idx) {
  cur = idx;
  tabsEl.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', +t.dataset.day === idx));
  contentEl.innerHTML = idx === 0 ? overviewContent() : renderDay(idx);
  showDay(idx);
  window.scrollTo({ top:0, behavior:'smooth' });
  const tab = tabsEl.querySelector(`[data-day="${idx}"]`);
  if (tab) tab.scrollIntoView({ behavior:'smooth', inline:'center', block:'nearest' });
}

function operatorLabel(operator) {
  if (operator === 'NS') return 'NS';
  if (operator === 'GVB') return 'GVB';
  if (operator === 'HTM') return 'HTM';
  if (operator === 'RET') return 'RET';
  if (operator === 'U-OV') return 'U-OV';
  return operator;
}

function findLocation(dayId, name) {
  const day = DAYS.find(d => d.id === dayId);
  if (!day) return null;
  const loc = day.locations.find(l => l.name === name);
  return loc ? { day, loc } : null;
}

function openDetail(dayId, name) {
  const found = findLocation(dayId, name);
  if (!found) return;
  const { day, loc } = found;
  detailKicker.textContent = `${day.label} · ${loc.category || loc.type}`;
  detailTitle.textContent = loc.name;
  detailSubtitle.textContent = `${day.title} · ${loc.time || ''}`;
  detailBody.innerHTML = renderDetailPanel(loc, day);
  detailOverlay.classList.add('show');
  detailOverlay.setAttribute('aria-hidden', 'false');
  document.body.style.overflow = 'hidden';
}

function openDetailByName(dayLabel, name) {
  const day = DAYS.find(d => d.label === dayLabel);
  if (day) openDetail(day.id, name);
}

function closeDetail() {
  detailOverlay.classList.remove('show');
  detailOverlay.setAttribute('aria-hidden', 'true');
  document.body.style.overflow = '';
}

detailOverlay.addEventListener('click', e => {
  if (e.target === detailOverlay) closeDetail();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeDetail();
});

function renderTransitSection(loc) {
  if (!loc.transit || !loc.transit.length) return '';
  return `<div class="detail-block"><h3>怎么到这里</h3><div class="restaurant-list">${loc.transit.map(leg => `
    <div class="restaurant-item">
      <h4>${leg.mode}${leg.line && leg.line !== '步行' ? ' · ' + leg.line : ''}</h4>

      </div>

function renderMuseumDetails(loc) {

function renderPlaceDetails(loc) {

function renderFoodDetails(loc) {

      <div class="restaurant-item">

        <p>${item.notes || ''}</p>
        <div class="dish-list">${(item.dishes || []).map(dish => `<span class="dish-pill">${dish}</span>`).join('')}</div>
      </div>`).join('')}</div></div>

function renderDetailPanel(loc, day) {
  const q = loc.gmap || encodeURIComponent(loc.name + ' Netherlands');
  let actions = `<div class="detail-block"><h3>快速操作</h3><div class="quick-actions"><button class="btn nav" onclick="openAS('${loc.name.replace(/'/g, "\\'")}',${loc.lat},${loc.lng},'${q}')">📍 导航</button>`;
  if (loc.officialUrl) actions += `<a class="btn official" href="${loc.officialUrl}" target="_blank" rel="noreferrer">Official Site</a>`;
  if (loc.bookingUrl) actions += `<a class="btn rsv" href="${loc.bookingUrl}" target="_blank" rel="noreferrer">Book Tickets at Official Site</a>`;
  actions += `</div></div>`;

  let blocks = `<div class="detail-block"><h3>当日位置</h3><p>${day.date} · ${day.title}</p><p style="margin-top:8px">${loc.desc}</p></div>`;
  if (day.dayLoop) {
    blocks += `<div class="detail-block"><h3>每日行程闭环</h3><p><strong style="color:var(--text-primary)">Morning Departure：</strong>${day.dayLoop.departure}</p><p style="margin-top:10px"><strong style="color:var(--text-primary)">Day's End：</strong>${day.dayLoop.ending}</p></div>`;
  }
  if (day.overnightStay) {
    blocks += `<div class="detail-block"><h3>异地留宿衔接</h3><p><strong style="color:var(--text-primary)">Hotel Recommendation Area：</strong>${day.overnightStay.hotelArea}</p><p style="margin-top:10px"><strong style="color:var(--text-primary)">Hotel → First Attraction：</strong>${day.overnightStay.hotelToFirstAttraction}</p><p style="margin-top:10px"><strong style="color:var(--text-primary)">Last Attraction → Hotel：</strong>${day.overnightStay.lastAttractionToHotel}</p></div>`;
  }
  blocks += actions;
  if (loc.category === 'museum') blocks += renderMuseumDetails(loc);
  else if (loc.category === 'food-hub') blocks += renderFoodDetails(loc);
  else blocks += renderPlaceDetails(loc);
  blocks += renderTransitSection(loc);
  return blocks;
}

tabsEl.addEventListener('click', e => {
  const t = e.target.closest('.tab');
  if (t) go(+t.dataset.day);
});

go(0);

const asOverlay = document.createElement('div');
asOverlay.className = 'detail-overlay';
asOverlay.style.zIndex = '10020';
asOverlay.innerHTML = `<div class="detail-shell" style="height:auto;max-height:none"><div class="detail-top"><div><div class="detail-kicker">导航方式</div><div class="modal-title section-title-serif" style="font-size:24px">打开地图</div><div class="detail-subtitle">选择你习惯的地图应用</div></div><button class="detail-close" onclick="closeAS()" aria-label="关闭">×</button></div><div class="detail-scroll" id="as-opts"></div></div>`;
document.body.appendChild(asOverlay);
asOverlay.addEventListener('click', e => { if (e.target === asOverlay) closeAS(); });

const IS_IOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
function amapAppUrl(name, lat, lng) {
  const scheme = IS_IOS ? 'iosamap' : 'androidamap';
  return `${scheme}://viewMap?sourceApplication=trip&poiname=${encodeURIComponent(name)}&lat=${lat}&lon=${lng}&dev=0`;
}
function amapWebUrl(name, lat, lng) {
  return `https://uri.amap.com/marker?position=${lng},${lat}&name=${encodeURIComponent(name)}&src=trip&coordinate=wgs84&callnative=1`;
}
function openAmap(name, lat, lng) {
  window.open(amapWebUrl(name, lat, lng));
}
function openAS(name, lat, lng, gmap) {
  const q = gmap || encodeURIComponent(name + ' Netherlands');
  const encName = encodeURIComponent(name);
  const safeName = name.replace(/'/g, "\\'");
  const appleUrl = `https://maps.apple.com/?q=${lat},${lng}&ll=${lat},${lng}&name=${encName}`;
  const googleUrl = `https://www.google.com/maps/search/?api=1&query=${q}`;
  let buttons = `<a class="btn official" href="${appleUrl}" target="_blank" rel="noreferrer">🍎 Apple Maps</a><a class="btn nav" href="${googleUrl}" target="_blank" rel="noreferrer">🗺️ Google Maps</a>`;
  if (OPTIONS.regionMode === 'cn' || OPTIONS.regionMode === 'hybrid') {
    buttons += `<button class="btn operator" onclick="openAmap('${safeName}',${lat},${lng});closeAS()">🧭 高德地图</button>`;
  }
  document.getElementById('as-opts').innerHTML = `
    <div class="detail-block"><h3>地图选择</h3><div class="quick-actions">${buttons}</div></div>`;
  asOverlay.classList.add('show');
  document.body.style.overflow = 'hidden';
}
function closeAS() {
  asOverlay.classList.remove('show');
  if (!detailOverlay.classList.contains('show')) document.body.style.overflow = '';
}
</script>
